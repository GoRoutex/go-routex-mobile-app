name: CI / mobile_release_build

on:
  push:
    branches:
      - master
      # - main

permissions:
  contents: write

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_BUILDKIT: "1"

jobs:
  release_build_mobile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # 1) AUTO TAG (bump patch)
      # -------------------------
      - name: Compute next tag
        id: nexttag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force --prune

          LAST_TAG="$(git tag -l "v*" --sort=-v:refname | head -n 1 || true)"
          if [ -z "${LAST_TAG}" ]; then LAST_TAG="v0.0.0"; fi

          VERSION="${LAST_TAG#v}"
          MAJOR="$(echo "$VERSION" | cut -d. -f1)"
          MINOR="$(echo "$VERSION" | cut -d. -f2)"
          PATCH="$(echo "$VERSION" | cut -d. -f3)"
          PATCH="$((PATCH + 1))"

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"

          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "$NEW_TAG" > tag.txt

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists. Please re-run."
            exit 1
          fi

      - name: Create & push annotated tag (with retry)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.nexttag.outputs.tag }}"

          git config user.email "routex@orion-hub"
          git config user.name "routex-bot"

          git tag -a "$TAG" -m "CI release $TAG"

          for i in 1 2 3; do
            if git push origin "$TAG"; then
              echo "Pushed tag $TAG"
              break
            fi
            echo "Push tag failed, retry $i..."
            sleep $((i * 2))
            git fetch --tags --force --prune
            if [ "$i" -eq 3 ]; then
              echo "Failed to push tag after retries."
              exit 1
            fi
          done

      # -------------------------
      # 2) SETUP NODE + INSTALL
      # -------------------------
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: |
          npx tsc --noEmit
          npm run lint --if-present
          npx expo-doctor

      # -------------------------
      # 3) SETUP EAS
      # -------------------------
      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Expo login check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami || true

      # -------------------------
      # 4) BUILD ANDROID
      # -------------------------
      - name: Build Android with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --auto-submit=false

      # -------------------------
      # 5) BUILD IOS (optional)
      # -------------------------
      # - name: Build iOS with EAS
      #   env:
      #     EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      #   run: |
      #     eas build \
      #       --platform ios \
      #       --profile preview \
      #       --non-interactive \
      #       --auto-submit=false
